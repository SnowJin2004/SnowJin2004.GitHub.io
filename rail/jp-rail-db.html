		@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&family=Noto+Sans+SC:wght@100..900&family=Noto+Sans+TC:wght@100..900&family=Noto+Sans+KR:wght@100..900&display=swap');

		.accordion section {
			padding: 0.5rem 1rem;
		}

		.accordion-btn {
			font-size: 1rem;
			width: 100%;
			vertical-align: middle;
			text-align: left;
			border: none;
			outline: none;
			cursor: pointer;
			background-color: unset;
			padding: 0;
			font-family: inherit;
			position: sticky;
			top: 0;
			z-index: 2;
			background-color: #fff;
			/* padding: 0.325em; */
			padding: 0.5em 1.5em 0.5em 2px;
		}

		.accordion-btn::after {
			content: '';
			background-image: url('../img/icon/right.svg');
			background-repeat: no-repeat;
			background-position: center;
			position: absolute;
			right: 0;
			top: auto;
			bottom: auto;
			width: 20px;
			height: 2em;
			background-size: 1em;
			transition: .25s cubic-bezier(0.45, 0.05, 0.55, 0.95);
		}

		.accordion-btn.open::after {
			content: '';
			background-image: url('../img/icon/right.svg');
			transform: rotate(90deg);
		}

		.accordion-btn h3 {
			padding: 0;
			display: inline-table;
			font-size: 1.25em;
			margin: 0;
		}

		.accordion-btn svg {
			height: 1.5em;
			width: 1.5em;
			vertical-align: top;
		}

		.accordion-btn span {
			vertical-align: bottom;
			line-height: 1.5em;
			word-break: keep-all;
			color: var(--line_colour);
		}

		.accordion-btn span:nth-of-type(1) {
			margin-left: 0.5em;
		}

		.accordion-btn span:not(:last-child)::after {
			content: "";
			width: 0.125em;
			height: 1.125em;
			background-color: #a2a9b1;
			background-color: rgba(from var(--line_colour) r g b / 0.625);
			margin: 0.1875em 0.325em;
			display: inline-block;
			vertical-align: bottom;
		}

		.panel {
			max-height: 0;
			overflow-x: auto;
			transition: .25s cubic-bezier(0.45, 0.05, 0.55, 0.95);
		}

		.panel table,
		.panel th,
		.panel td {
			border-collapse: collapse;
			border: 0;
			border-bottom: 1px solid #a2a9b1;
		}

		.panel th {
			background-color: #eaecf0;
			text-align: center
		}

		.panel th,
		.panel td {
			/* padding: 0.2em 0.4em */
			padding: 0.5em 0.75em
		}

		.panel td:nth-of-type(1) {
			padding: 0.2em 0.5em;
		}

		.panel td:nth-of-type(2) {
			padding-left: 0.2em;
		}

		.panel td:nth-last-of-type(2) {
			padding-right: 0.2em;
		}

		.panel th:first-child,
		.panel td:first-child {
			position: sticky;
			left: 0;
			z-index: 1;
			background-color: #fff;
		}

		.panel th:last-child,
		.panel td:last-child {
			position: sticky;
			right: 0;
			z-index: 1;
			background-color: #fff;
		}

		.panel.open {
			max-height: 100em;
		}

		.panel table td:first-child {
			width: 24px;
			padding: 0 0.325em;
			align-content: center;
		}

		.panel table svg {
			height: 1.5em;
			width: 1.5em;
			vertical-align: middle;
		}

		.panel table *:lang(ja),
		.accordion-btn *:lang(ja) {
			font-family: "Noto Sans JP", "Noto Sans CJK JP", sans-serif;
		}

		.panel table *:lang(en),
		.accordion-btn *:lang(en) {
			font-family: "Inter Variable", "Inter", "Roboto", sans-serif;
		}

		.panel table *:lang(zh-Hans),
		.accordion-btn *:lang(zh-Hans) {
			font-family: "Noto Sans SC", "Noto Sans CJK SC", sans-serif;
		}

		.panel table *:lang(zh-Hant),
		.accordion-btn *:lang(zh-Hant) {
			font-family: "Noto Sans TC", "Noto Sans CJK TC", sans-serif;
		}

		.panel table *:lang(ko),
		.accordion-btn *:lang(ko) {
			font-family: "Noto Sans KR", "Noto Sans CJK KR", sans-serif;
		}

		.panel table *:lang(zh-Latn),
		.accordion-btn *:lang(zh-Latn) {
			font-family: "Inter Variable", "Inter", sans-serif;
			font-feature-settings: "cv11" 1;
		}

		.panel table td span:not([class^="vs"]) {
			font-size: 0.75em;
			font-weight: 450;
		}

		td span.full {
			margin-left: -0.5em;
		}

		td.en span.full {
			font-family: "Inter Variable", "Inter", "Noto Sans JP", "Noto Sans CJK JP Regular";
		}


		.panel table td span.vs17::after {

		}

		.panel table td span.vs18::after {
			content: "\E0101";
		}

		.panel table td span.vs19::after {

		}

		.panel table td.link {
			width: 0.75em;
		}

		.panel table td.link a {
			content: "";
			background-color: var(--text_colour);
			display: list-item;
			mask: url(../img/icon/right.svg);
		}

		.panel table td.link a[target="_blank"]:hover {
			background-color: var(--line_colour);
			transition: .125s ease-in-out;
		}

		.panel table td.link a[target="_self"] {
			background-color: var(--grey_2);
			cursor: not-allowed;
		}

		.panel table tr.wip {
			color: var(--grey_2);
		}

		.panel table tr.wip:hover {
			color: #fff;
		}

		.panel table tr.wip:hover td.link a[target="_self"] {
			background-color: #fff;
			cursor: not-allowed;
		}

		td.set::after {
			content: "*";
			color: #a2a9b1;
		}

		.panel::-webkit-scrollbar {
			height: 0.5rem;
			width: 0.5rem;
			position: absolute;
			bottom: 0;
		}

		.panel::-webkit-scrollbar-track {
			background: var(--grey_2);
		}

		.panel::-webkit-scrollbar-thumb {
			background: var(--grey_1);
		}

		.panel::-webkit-scrollbar-thumb:hover {

		}

		@media (min-width: 480px) {

			.panel table tr:hover,
			.panel table tr:hover td:first-child,
			.panel table tr:hover td:last-child {

				--line_colour_opacity: 0.125;
				background-color: rgb(from var(--line_colour) calc(r * var(--line_colour_opacity) + 255 * (1 - var(--line_colour_opacity))) calc(g * var(--line_colour_opacity) + 255 * (1 - var(--line_colour_opacity))) calc(b * var(--line_colour_opacity) + 255 * (1 - var(--line_colour_opacity))));
			}
		}

		@media (max-width: 480px) {
			:root {
				--rem: 24px;
			}

			.accordion-btn h3 svg {
				font-size: 1.75rem;
				float: left;
			}

			.accordion-btn h3 span:nth-of-type(1) {
				display: block;
				margin-left: 3rem;
				font-size: 1.5rem;
				line-height: 1.75rem;
			}

			.accordion-btn h3 span:nth-of-type(2) {
				display: block;
				margin-left: 3rem;
				font-size: 0.875rem;
				line-height: 0.875rem;
			}

			.panel table td:last-child {
				position: initial;
			}

			.accordion-btn h3 span:nth-of-type(1)::after,
			.accordion-btn h3 span:nth-of-type(2)::after {
				content: none;
			}

			.accordion-btn h3 span:nth-of-type(n+3) {
				color: rgba(from var(--line_colour) r g b / 0.75);
				font-size: 0.875em;
			}

			.panel table:not(:has(td:first-child svg)) td:first-child {
				display: none;
			}

			.panel table td:first-child:not(:has(svg))+td:nth-of-type(2) {
				padding: 0.5em 0.75em;
			}

			.panel::-webkit-scrollbar {
				height: 0.25rem;
				width: 0.25rem;
			}
		}
	</style>
	<script>
		function toggleAccordion(event, sectionId) {
			// Get the panel and button
			const panel = document.getElementById(sectionId);
			const button = event.currentTarget;

			// Toggle panel visibility and lazy-load content if not already loaded
			if (!panel.classList.contains("open")) {
				panel.classList.add("open");
				button.classList.add("open"); // Add open class to button
				if (panel.getAttribute("data-loaded") === "false") {
					fetch(`./content/${sectionId}.html`)
						.then(response => response.text())
						.then(data => {
							panel.innerHTML = data;
							panel.setAttribute("data-loaded", "true");
						})
						.catch(error => console.error("Error loading content:", error));
				}
			} else {
				panel.classList.remove("open");
				button.classList.remove("open"); // Remove open class from button
			}
		}
	</script>
